name: ForgePilot Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  quality:
    name: Release Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,redis]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -q

  sidecar:
    name: Sidecar Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Detect Frontend Shell
        shell: bash
        run: |
          rel="$(python scripts/resolve_frontend_shell.py --repo-root . --relative)"
          echo "FRONTEND_SHELL_REL=$rel" >> "$GITHUB_ENV"

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller

      - name: Build Python Sidecar
        run: |
          python scripts/build_python_sidecar.py --repo-root . --binary-name forgepilot-agent-api

      - name: Generate SHA256
        run: |
          python scripts/write_sidecar_checksums.py --repo-root . --pattern "forgepilot-agent-api-*" --output .build/sidecar-sha256.txt

      - name: Upload Sidecar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgepilot-agent-sidecar-${{ matrix.os }}
          path: |
            ${{ env.FRONTEND_SHELL_REL }}/src-api/dist/forgepilot-agent-api-*
            .build/sidecar-sha256.txt

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: sidecar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .build/release-assets

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
          else
            version="${{ github.event.inputs.version }}"
            tag="v${version}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        run: |
          python scripts/generate_release_notes.py \
            --changelog CHANGELOG.md \
            --version "${{ steps.version.outputs.version }}" \
            --output .build/release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: .build/release-notes.md
          files: .build/release-assets/**/*
          fail_on_unmatched_files: false
