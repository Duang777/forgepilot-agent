name: ForgePilot Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  quality:
    name: Release Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --extra dev --extra redis

      - name: Ruff
        run: uv run python -m ruff check .

      - name: Mypy
        run: uv run python -m mypy scripts/dev.py scripts/build_python_sidecar.py scripts/write_sidecar_checksums.py scripts/resolve_frontend_shell.py

      - name: Pytest
        run: uv run python -m pytest -q

  sidecar:
    name: Sidecar Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Detect Frontend Shell
        shell: bash
        run: |
          rel="$(uv run python scripts/resolve_frontend_shell.py --repo-root . --relative)"
          echo "FRONTEND_SHELL_REL=$rel" >> "$GITHUB_ENV"

      - name: Install Build Dependencies
        run: uv sync

      - name: Build Python Sidecar
        run: uv run --with pyinstaller python scripts/dev.py sidecar --binary-name forgepilot-agent-api --checksum-output .build/sidecar-sha256.txt

      - name: Upload Sidecar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgepilot-agent-sidecar-${{ matrix.os }}
          path: |
            ${{ env.FRONTEND_SHELL_REL }}/src-api/dist/forgepilot-agent-api-*
            .build/sidecar-sha256.txt

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: sidecar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .build/release-assets

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
          else
            version="${{ github.event.inputs.version }}"
            tag="v${version}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        run: |
          uv run python scripts/generate_release_notes.py \
            --changelog CHANGELOG.md \
            --version "${{ steps.version.outputs.version }}" \
            --output .build/release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: .build/release-notes.md
          files: .build/release-assets/**/*
          fail_on_unmatched_files: false
