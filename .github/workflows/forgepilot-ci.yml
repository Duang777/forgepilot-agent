name: ForgePilot CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff Lint
        run: python -m ruff check .

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Pytest
        run: python -m pytest -q

  tauri-cargo-check:
    name: Tauri Cargo Check
    runs-on: windows-latest
    needs: python-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect Frontend Shell
        shell: bash
        run: |
          rel="$(python scripts/resolve_frontend_shell.py --repo-root . --relative)"
          echo "FRONTEND_SHELL_REL=$rel" >> "$GITHUB_ENV"

      - name: Cargo Check
        working-directory: ${{ env.FRONTEND_SHELL_REL }}/src-tauri
        run: cargo check

  sidecar-matrix:
    name: Sidecar Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - python-tests
      - tauri-cargo-check
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Detect Frontend Shell
        shell: bash
        run: |
          rel="$(python scripts/resolve_frontend_shell.py --repo-root . --relative)"
          echo "FRONTEND_SHELL_REL=$rel" >> "$GITHUB_ENV"

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build Python Sidecar
        run: |
          python scripts/build_python_sidecar.py --repo-root . --binary-name forgepilot-agent-api

      - name: Generate SHA256
        run: |
          python scripts/write_sidecar_checksums.py --repo-root . --pattern "forgepilot-agent-api-*" --output .build/sidecar-sha256.txt

      - name: Upload Sidecar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgepilot-agent-sidecar-${{ matrix.os }}
          path: |
            ${{ env.FRONTEND_SHELL_REL }}/src-api/dist/forgepilot-agent-api-*
            .build/sidecar-sha256.txt
