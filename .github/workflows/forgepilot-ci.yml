name: ForgePilot CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Ruff Lint
        run: uv run python -m ruff check .

      - name: Mypy Typecheck
        run: uv run python -m mypy scripts/dev.py scripts/build_python_sidecar.py scripts/write_sidecar_checksums.py scripts/resolve_frontend_shell.py

      - name: Baseline Parity Check
        run: uv run python scripts/dev.py parity --strict

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Run Pytest
        run: uv run python -m pytest -q

  tauri-cargo-check:
    name: Tauri Cargo Check
    runs-on: windows-latest
    needs: python-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Detect Frontend Shell
        shell: bash
        run: |
          rel="$(uv run python scripts/resolve_frontend_shell.py --repo-root . --relative)"
          echo "FRONTEND_SHELL_REL=$rel" >> "$GITHUB_ENV"

      - name: Cargo Check
        working-directory: ${{ env.FRONTEND_SHELL_REL }}/src-tauri
        run: cargo check

  sidecar-matrix:
    name: Sidecar Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - python-tests
      - tauri-cargo-check
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Detect Frontend Shell
        shell: bash
        run: |
          rel="$(uv run python scripts/resolve_frontend_shell.py --repo-root . --relative)"
          echo "FRONTEND_SHELL_REL=$rel" >> "$GITHUB_ENV"

      - name: Install Build Dependencies
        run: uv sync

      - name: Build Python Sidecar
        run: uv run --with pyinstaller python scripts/dev.py sidecar --binary-name forgepilot-agent-api --checksum-output .build/sidecar-sha256.txt

      - name: Upload Sidecar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgepilot-agent-sidecar-${{ matrix.os }}
          path: |
            ${{ env.FRONTEND_SHELL_REL }}/src-api/dist/forgepilot-agent-api-*
            .build/sidecar-sha256.txt
